
<html>
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <title>EdgeAI Labeling</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">

  <!-- TOP BAR -->

  <div class="topbar">


<div class="top-left">
  <select id="projectSelect"></select>
  <button onclick="loadProject()">Load</button>

  <input id="projectName" placeholder="Project name" />
  <button onclick="createProject()">Create</button>
</div>

<div class="top-center">
  <input type="file" id="folderInput" multiple accept=".jpg,.jpeg,.png" />
  <button onclick="uploadFolder()">Upload</button>

  <select id="batchSelect" onchange="onBatchChange(this.value)">
    <option value="all">All batch</option>
  </select>
</div>

<div class="top-right">
  <select id="modelSelect"></select>
  <button onclick="uploadModel()">Upload Model</button>
  <button class="btn-primary" onclick="autoDetect()">Auto</button>

  <button class="btn-primary" onclick="save()">Save</button>
  <button onclick="resetView()">Reset</button>
  <button id="undoBtn" onclick="clearLast()">Undo</button>
  <button id="redoBtn" onclick="redoLast()">Redo</button>
  <button onclick="exportDataset()">Export</button>
  <button class="btn-hotkey-help" onclick="toggleHotkeyModal()" title="Hotkeys (?)">?</button>
</div>


  </div>

  <!-- MAIN -->

  <div class="main">


<!-- LEFT -->
<div class="left-panel">
  <div class="panel-title">Classes</div>

  <div class="class-section">
    <select id="classSelect"></select>
    <input id="newClass" placeholder="New class..." />
    <div class="class-actions">
      <button onclick="addClass()">Add</button>
      <button class="btn-danger" onclick="deleteSelected()">Delete</button>
    </div>
  </div>

  <div class="filter-group">
    <button id="btnAll" class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button id="btnLabeled" class="filter-btn" onclick="setFilter('labeled', this)">Labeled</button>
    <button id="btnUnlabeled" class="filter-btn" onclick="setFilter('unlabeled', this)">Unlabeled</button>
  </div>

  <div id="imageCounter"></div>
</div>

<!-- CENTER (🔥 FIX CHÍNH) -->
<div class="center-view">

  <!-- CANVAS -->
  <div class="canvas-container">
    <canvas id="canvas"></canvas>

    <div class="bottom-bar">
      <button onclick="prevImage()">◀</button>
      <span id="imageIndex">1 / N</span>
      <button onclick="nextImage()">▶</button>
    </div>
  </div>

  <!-- GRID -->
<div id="gridWrapper" style="display:none;">
  <div id="gridView" class="grid-view"></div>
  <div id="pagination"></div>
</div>

</div>

<!-- RIGHT -->
<div id="bboxSidebar" class="right-panel">
  <div class="panel-title">BBoxes</div>
  <div id="selectedBoxEditor" class="selected-box-editor" style="display:none;">
    <div class="selected-box-title">Selected object</div>
    <div id="selectedBoxCurrentClass" class="selected-box-current">
      <span>Current class</span>
      <span id="selectedBoxCurrentBadge" class="selected-box-badge">No class</span>
    </div>
    <select id="selectedBoxClassSelect"></select>
    <button id="selectedBoxChangeBtn" class="btn-primary" style="display:none;" onclick="changeClassSelected('selectedBoxClassSelect')">Change</button>
  </div>
  <div id="bboxList"></div>
</div>


  </div>

</div>

<select id="floatingClass"
style="
 position: fixed;
 display: none;
 z-index: 99999;
 background: #111827;
 color: white;
 border: 1px solid #374151;
 padding: 6px;
 border-radius: 6px;
 min-width: 100px;
 box-shadow: 0 10px 30px rgba(0,0,0,0.6);
"> </select>

<script src="/static/src/app.js"></script>

<!-- HOTKEY MODAL -->
<div id="hotkeyModal" style="display:none;" class="hotkey-modal-overlay" onclick="if(event.target===this)closeHotkeyModal()">
  <div class="hotkey-modal">
    <div class="hotkey-modal-header">
      <span>Keyboard Shortcuts</span>
      <button class="hotkey-modal-close" onclick="closeHotkeyModal()">✕</button>
    </div>
    <div class="hotkey-modal-body">
      <div class="hotkey-group">
        <div class="hotkey-group-title">Navigation</div>
        <div class="hotkey-row"><kbd>←</kbd><kbd>→</kbd><span>Previous / Next image</span></div>
        <div class="hotkey-row"><kbd>Tab</kbd><span>Next bbox</span></div>
        <div class="hotkey-row"><kbd>Shift</kbd><kbd>Tab</kbd><span>Previous bbox</span></div>
      </div>
      <div class="hotkey-group">
        <div class="hotkey-group-title">Edit</div>
        <div class="hotkey-row"><kbd>Del</kbd><span>Delete selected bbox</span></div>
        <div class="hotkey-row"><kbd>Ctrl</kbd><kbd>Z</kbd><span>Undo</span></div>
        <div class="hotkey-row"><kbd>Ctrl</kbd><kbd>Y</kbd><span>Redo</span></div>
      </div>
      <div class="hotkey-group">
        <div class="hotkey-group-title">View & File</div>
        <div class="hotkey-row"><kbd>Space</kbd><span>Reset view</span></div>
        <div class="hotkey-row"><kbd>Ctrl</kbd><kbd>S</kbd><span>Save</span></div>
        <div class="hotkey-row"><kbd>Esc</kbd><span>Deselect bbox</span></div>
        <div class="hotkey-row"><kbd>?</kbd><span>Show this panel</span></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
